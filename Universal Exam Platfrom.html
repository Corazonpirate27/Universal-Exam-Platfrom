<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Universal Exam Platform</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      main {
        width: min(720px, calc(100% - 32px));
        border: 1px solid #dbe3ef;
        border-radius: 12px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 20px 50px rgb(15 23 42 / 0.10);
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 6vw, 42px);
      }

      p {
        color: #475569;
        line-height: 1.7;
      }

      code {
        border-radius: 6px;
        background: #eef2ff;
        padding: 3px 6px;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Universal Exam Platform</h1>
      <p>
        This single-file prototype has been replaced by a React + Vite application in <code>src/</code>.
        Run <code>npm install</code> and <code>npm run dev</code> from this folder to start the upgraded app.
      </p>
      <p>
        Content notice: Teachers/users are responsible for uploading content they have rights to use.
      </p>
    </main>
  </body>
</html>
